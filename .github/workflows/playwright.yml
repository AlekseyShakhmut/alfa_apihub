name: API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [products, auth, advanced]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}" >> .env
          echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}" >> .env
          echo "API_BASE_URL=https://api.freeapi.app/api/v1" >> .env

      - name: Run tests for ${{ matrix.module }}
        run: npx playwright test tests/${{ matrix.module }}/ --reporter=html,allure-playwright,list
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.module }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (traces, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.module }}-${{ github.run_id }}
          path: test-results/
          retention-days: 30

      - name: Install Allure command line
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results -o allure-report --clean
            echo "Allure report generated successfully"
          else
            echo "allure-results folder not found, skipping report generation"
          fi

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.module }}-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

  notify:
    name: Send notification
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: echo "Tests completed"